coverage:
  status:
    project:
      default:
        target: 50%
        threshold: 2%

    patch:
      default:
        target: 20% # Need to bump this number https://docs.codecov.com/docs/commit-status#patch-status
        threshold: 2%

# This is not currently used, but it is a good idea to have it in place.
# If `codecov/codecov-action` is run with build files present, it reruns `gcov`.
#
# More info: https://github.com/XRPLF/clio/pull/2066
ignore:
  - "tests"
  - "src/data/cassandra/"
  - "src/data/CassandraBackend.hpp"
  - "src/data/BackendFactory.*"
