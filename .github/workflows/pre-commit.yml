name: Run pre-commit hooks

on:
  pull_request:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  run-hooks:
    runs-on: heavy
    container:
      image: ghcr.io/mathbunnyru/clio-ci:b4f5d27718699f59f4ca879a221dfb929b8d77c4

    steps:
      - name: Checkout Repo ⚡️
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare runner
        uses: XRPLF/actions/.github/actions/prepare-runner@7951b682e5a2973b28b0719a72f01fc4b0d0c34f
        with:
          disable_ccache: true

      - name: Run pre-commit ✅
        run: pre-commit run --all-files
