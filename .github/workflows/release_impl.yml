name: Make release

on:
  workflow_call:
    inputs:
      overwrite_release:
        description: "Overwrite the current release and tag"
        required: true
        type: boolean

      title:
        description: "Release title"
        required: true
        type: string

      version:
        description: "Release version"
        required: true
        type: string

      header:
        description: "Release notes header"
        required: true
        type: string

      generate_changelog:
        description: "Generate changelog"
        required: false
        type: boolean

      draft:
        description: "Create a draft release"
        required: false
        type: boolean

jobs:
  release:
    runs-on: heavy
    container: '{ "image": "ghcr.io/xrplf/clio-ci:latest" }'
    env:
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release_artifacts
          pattern: clio_server_*

      - name: Create release notes
        shell: bash
        run: |
          echo ${{ inputs.header }} > "${RUNNER_TEMP}/release_notes.md"

      - name: Generate changelog
        shell: bash
        if: ${{ inputs.generate_changelog }}
        run: |
          git-cliff
          cat CHANGELOG.md >> "${RUNNER_TEMP}/release_notes.md"

      - name: Prepare release artifacts
        shell: bash
        working-directory: release_artifacts
        run: .github/scripts/prepare-release-artifacts.sh

      - name: Append sha256 checksums
        shell: bash
        working-directory: release_artifacts
        run: |
          {
            echo '## SHA256 checksums'
            echo
            echo '```'
            sha256sum *
            echo '```'
          } >> "${RUNNER_TEMP}/release_notes.md"

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release_notes
          path: "${RUNNER_TEMP}/release_notes.md"

      - name: Remove current release and tag
        if: ${{ github.event_name != 'pull_request' && inputs.overwrite_release }}
        shell: bash
        run: |
          gh release delete ${{ inputs.version }} --yes || true
          git push origin :${{ inputs.version }} || true

      - name: Publish release
        if: ${{ github.event_name != 'pull_request' }}
        shell: bash
        run: |
          gh release create ${{ inputs.version }} \
            ${{ inputs.overwrite_release && '--prerelease' || '' }} \
            --title "${{ inputs.title }}" \
            --target $GITHUB_SHA \
            ${{ inputs.draft && '--draft' || '' }} \
            --notes-file "${RUNNER_TEMP}/release_notes.md" \
            ./release_artifacts/clio_server*
