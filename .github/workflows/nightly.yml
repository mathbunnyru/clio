name: Nightly release

on:
  schedule:
    - cron: "0 8 * * 1-5"
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/nightly.yml

      - .github/workflows/reusable-release.yml
      - .github/workflows/reusable-build-test.yml
      - .github/workflows/reusable-build.yml
      - .github/workflows/reusable-test.yml
      - .github/workflows/build-clio-docker-image.yml

      - ".github/actions/**"
      - "!.github/actions/code-coverage/**"
      - .github/scripts/prepare-release-artifacts.sh

concurrency:
  # Only cancel in-progress jobs or runs for the current workflow - matches against branch & tags
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  get_date:
    name: Get Date
    runs-on: ubuntu-latest
    outputs:
      date: ${{ steps.get_date.outputs.date }}
    steps:
      - name: Get current date
        id: get_date
        run: |
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

  build-and-test:
    name: Build and Test
    needs: get_date

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos15
            conan_profile: apple-clang
            build_type: Release
            static: false
          - os: heavy
            conan_profile: gcc
            build_type: Release
            static: true
            container: '{ "image": "ghcr.io/xrplf/clio-ci:14342e087ceb8b593027198bf9ef06a43833c696" }'
          - os: heavy
            conan_profile: gcc
            build_type: Debug
            static: true
            container: '{ "image": "ghcr.io/xrplf/clio-ci:14342e087ceb8b593027198bf9ef06a43833c696" }'
          - os: heavy
            conan_profile: gcc.ubsan
            build_type: Release
            static: false
            container: '{ "image": "ghcr.io/xrplf/clio-ci:14342e087ceb8b593027198bf9ef06a43833c696" }'

    uses: ./.github/workflows/reusable-build-test.yml
    with:
      runs_on: ${{ matrix.os }}
      container: ${{ matrix.container }}
      conan_profile: ${{ matrix.conan_profile }}
      build_type: ${{ matrix.build_type }}
      static: ${{ matrix.static }}
      run_unit_tests: true
      run_integration_tests: true
      upload_clio_server: true
      download_ccache: false
      upload_ccache: false
      version: nightly-${{ needs.get_date.outputs.date }}

  package:
    name: Build debian package
    needs: get_date

    uses: ./.github/workflows/reusable-build.yml
    with:
      runs_on: heavy
      container: '{ "image": "ghcr.io/xrplf/clio-ci:14342e087ceb8b593027198bf9ef06a43833c696" }'
      conan_profile: gcc
      build_type: Release
      download_ccache: false
      upload_ccache: false
      code_coverage: false
      static: true
      upload_clio_server: false
      package: true
      version: nightly-${{ needs.get_date.outputs.date }}
      targets: package
      analyze_build_time: false

  analyze_build_time:
    name: Analyze Build Time
    needs: get_date

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: heavy
            conan_profile: clang
            container: '{ "image": "ghcr.io/xrplf/clio-ci:14342e087ceb8b593027198bf9ef06a43833c696" }'
            static: true
          - os: macos15
            conan_profile: apple-clang
            container: ""
            static: false
    uses: ./.github/workflows/reusable-build.yml
    with:
      runs_on: ${{ matrix.os }}
      container: ${{ matrix.container }}
      conan_profile: ${{ matrix.conan_profile }}
      build_type: Release
      download_ccache: false
      upload_ccache: false
      code_coverage: false
      static: ${{ matrix.static }}
      upload_clio_server: false
      targets: all
      analyze_build_time: true
      version: nightly-${{ needs.get_date.outputs.date }}

  nightly_release:
    needs: [build-and-test, package, get_date]
    uses: ./.github/workflows/reusable-release.yml
    with:
      delete_pattern: "nightly-*"
      prerelease: true
      title: "Clio development build (nightly-${{ needs.get_date.outputs.date }})"
      version: nightly-${{ needs.get_date.outputs.date }}
      header: >
        > **Note:** Please remember that this is a development release and it is not recommended for production use.

        Changelog (including previous releases): <https://github.com/XRPLF/clio/commits/nightly-${{ needs.get_date.outputs.date }}>
      generate_changelog: false
      draft: false

  build_and_publish_docker_image:
    uses: ./.github/workflows/build-clio-docker-image.yml
    needs: build-and-test
    secrets: inherit
    with:
      tags: |
        type=raw,value=nightly
        type=raw,value=${{ github.sha }}
      artifact_name: clio_server_Linux_Release_gcc
      strip_binary: true
      publish_image: ${{ github.event_name != 'pull_request' }}

  create_issue_on_failure:
    needs: [build-and-test, nightly_release, build_and_publish_docker_image]
    if: ${{ always() && contains(needs.*.result, 'failure') && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Create an issue
        uses: ./.github/actions/create-issue
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          title: "Nightly release failed 🌙"
          body: >
            Nightly release failed:

            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/
